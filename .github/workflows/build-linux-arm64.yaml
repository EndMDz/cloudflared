name: Build Linux ARM64

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Build cloudflared for Linux ARM64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          make cloudflared
          mkdir -p artifacts
          mv cloudflared artifacts/cloudflared-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-linux-arm64
          path: artifacts/cloudflared-linux-arm64
          retention-days: 30
